name: Move WDP snapshots from wdp/ to root

on:
  workflow_dispatch:

jobs:
  move-wdp:
    runs-on: ubuntu-latest
    steps:
      - name: Install rclone and jq
        run: |
          sudo apt-get update
          sudo apt-get install -y rclone jq

      - name: Configure rclone for R2
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf <<EOF
          [r2]
          type = s3
          provider = Cloudflare
          access_key_id = ${{ secrets.R2_ACCESS_KEY_ID }}
          secret_access_key = ${{ secrets.R2_SECRET_ACCESS_KEY }}
          endpoint = ${{ secrets.R2_ENDPOINT }}
          region = auto
          EOF

      - name: Move files (copy + delete)
        run: |
          set -euo pipefail
          BUCKET="${{ secrets.R2_BUCKET }}"

          echo "Copying wdp/wdpsnapshot_*.png to root..."
          rclone copy "r2:$BUCKET/wdp/" "r2:$BUCKET/" --include "wdpsnapshot_*.png"

          echo "Deleting original files from wdp/..."
          rclone delete "r2:$BUCKET/wdp/" --include "wdpsnapshot_*.png"

          echo "Merging manifests..."
          # Download wdp manifest if it exists
          if rclone lsf "r2:$BUCKET/wdp/snapshots.json" &>/dev/null; then
            rclone cat "r2:$BUCKET/wdp/snapshots.json" > /tmp/wdp_manifest.json
            # Download root manifest or create empty
            if rclone lsf "r2:$BUCKET/snapshots.json" &>/dev/null; then
              rclone cat "r2:$BUCKET/snapshots.json" > /tmp/root_manifest.json
            else
              echo '[]' > /tmp/root_manifest.json
            fi
            # Merge and deduplicate
            jq -s 'add | unique' /tmp/root_manifest.json /tmp/wdp_manifest.json > /tmp/merged.json
            rclone copyto /tmp/merged.json "r2:$BUCKET/snapshots.json"
            rm -f /tmp/*.json
          fi

          echo "Deleting wdp/snapshots.json (now merged)"
          rclone delete "r2:$BUCKET/wdp/snapshots.json" 2>/dev/null || true

          echo "Removing empty wdp/ directory"
          rclone rmdir "r2:$BUCKET/wdp" 2>/dev/null && echo "wdp/ removed" || echo "wdp/ not empty or already gone"

      - name: Verify the move
        run: |
          BUCKET="${{ secrets.R2_BUCKET }}"
          echo "Root snapshots.json entries (first 10):"
          rclone cat "r2:$BUCKET/snapshots.json" 2>/dev/null | jq -r '.[]' | head -10 || echo "No root manifest yet"
          echo ""
          echo "Root wdpsnapshot files count:"
          rclone lsf "r2:$BUCKET/wdpsnapshot_*.png" 2>/dev/null | wc -l
          echo ""
          echo "wdp/ prefix still present?"
          if rclone lsd "r2:$BUCKET/" | grep -q wdp; then
            echo "❌ ERROR: wdp/ still exists (not empty)"
            rclone lsf "r2:$BUCKET/wdp/"
          else
            echo "✅ wdp/ successfully removed"
          fi
