name: Rename wdp_snapshot_*.png to wdpsnapshot_*.png (no JSON)

on:
  workflow_dispatch:

jobs:
  rename:
    runs-on: ubuntu-latest
    steps:
      - name: Install rclone
        run: |
          sudo apt-get update
          sudo apt-get install -y rclone

      - name: Configure rclone for R2
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf <<EOF
          [r2]
          type = s3
          provider = Cloudflare
          access_key_id = ${{ secrets.R2_ACCESS_KEY_ID }}
          secret_access_key = ${{ secrets.R2_SECRET_ACCESS_KEY }}
          endpoint = ${{ secrets.R2_ENDPOINT }}
          region = auto
          EOF

      - name: Rename files (copy + delete)
        run: |
          set -euo pipefail
          BUCKET="${{ secrets.R2_BUCKET }}"

          echo "Renaming wdp_snapshot_*.png -> wdpsnapshot_*.png"

          rclone lsf "r2:$BUCKET/wdp_snapshot_*.png" | while read -r oldname; do
            newname="${oldname/wdp_snapshot_/wdpsnapshot_}"
            echo "  $oldname -> $newname"
            rclone copyto "r2:$BUCKET/$oldname" "r2:$BUCKET/$newname"
            rclone deletefile "r2:$BUCKET/$oldname"
          done

          echo "Done. No changes made to snapshots.json."

      - name: Verify (optional)
        run: |
          BUCKET="${{ secrets.R2_BUCKET }}"
          echo "Remaining wdp_snapshot_*.png files (should be 0):"
          rclone lsf "r2:$BUCKET/wdp_snapshot_*.png" | wc -l
          echo "New wdpsnapshot_*.png files count:"
          rclone lsf "r2:$BUCKET/wdpsnapshot_*.png" | wc -l
