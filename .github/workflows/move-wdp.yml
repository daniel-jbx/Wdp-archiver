name: Rename wdp_snapshot_*.png to wdpsnapshot_*.png (no JSON)

on:
  workflow_dispatch:

jobs:
  rename:
    runs-on: ubuntu-latest
    steps:
      - name: Install rclone
        run: |
          sudo apt-get update
          sudo apt-get install -y rclone

      - name: Configure rclone for R2
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf <<EOF
          [r2]
          type = s3
          provider = Cloudflare
          access_key_id = ${{ secrets.R2_ACCESS_KEY_ID }}
          secret_access_key = ${{ secrets.R2_SECRET_ACCESS_KEY }}
          endpoint = ${{ secrets.R2_ENDPOINT }}
          region = auto
          EOF

      - name: Rename files (copy + delete)
        run: |
          set -euo pipefail
          BUCKET="${{ secrets.R2_BUCKET }}"

          echo "Finding all wdp_snapshot_*.png files in root..."
          # Use rclone ls with --include to list matching files
          rclone ls "r2:$BUCKET/" --include "wdp_snapshot_*.png" | awk '{print $2}' > /tmp/files.txt
          cat /tmp/files.txt

          while read -r oldname; do
            if [[ -z "$oldname" ]]; then continue; fi
            newname="${oldname/wdp_snapshot_/wdpsnapshot_}"
            echo "Renaming: $oldname -> $newname"
            rclone copyto "r2:$BUCKET/$oldname" "r2:$BUCKET/$newname"
            rclone deletefile "r2:$BUCKET/$oldname"
          done < /tmp/files.txt

          echo "Done."

      - name: Verify
        run: |
          BUCKET="${{ secrets.R2_BUCKET }}"
          echo "Remaining wdp_snapshot_*.png files:"
          rclone ls "r2:$BUCKET/" --include "wdp_snapshot_*.png" | wc -l
          echo "Total wdpsnapshot_*.png files:"
          rclone ls "r2:$BUCKET/" --include "wdpsnapshot_*.png" | wc -l
