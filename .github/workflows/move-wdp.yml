name: Move WDP snapshots from wdp/ to root

on:
  workflow_dispatch:    # Manual trigger only

jobs:
  move-wdp:
    runs-on: ubuntu-latest
    steps:
      - name: Install rclone
        run: |
          sudo apt-get update
          sudo apt-get install -y rclone jq

      - name: Configure rclone with R2
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf <<EOF
          [r2]
          type = s3
          provider = Cloudflare
          access_key_id = ${{ secrets.R2_ACCESS_KEY_ID }}
          secret_access_key = ${{ secrets.R2_SECRET_ACCESS_KEY }}
          endpoint = ${{ secrets.R2_ENDPOINT }}
          region = auto
          EOF

      - name: Move wdp snapshots to root
        run: |
          set -euo pipefail
          BUCKET="${{ secrets.R2_BUCKET }}"
          echo "Moving WDP snapshots from wdp/ to root..."

          # Move each snapshot file
          rclone lsf "r2:$BUCKET/wdp/wdpsnapshot_*.png" | while read -r file; do
            echo "Moving wdp/$file -> $file"
            rclone moveto "r2:$BUCKET/wdp/$file" "r2:$BUCKET/$file"
          done

          # Merge wdp/snapshots.json into root snapshots.json
          tmp_manifest=$(mktemp)
          if rclone cat "r2:$BUCKET/wdp/snapshots.json" 2>/dev/null > "$tmp_manifest"; then
            echo "Merging wdp/snapshots.json into root snapshots.json"
            root_tmp=$(mktemp)
            if rclone cat "r2:$BUCKET/snapshots.json" 2>/dev/null > "$root_tmp"; then
              jq -s 'add | unique' "$root_tmp" "$tmp_manifest" > "$root_tmp.new"
              rclone copyto "$root_tmp.new" "r2:$BUCKET/snapshots.json"
            else
              rclone copyto "$tmp_manifest" "r2:$BUCKET/snapshots.json"
            fi
            rm -f "$root_tmp" "$root_tmp.new"
          fi
          rm -f "$tmp_manifest"

          # Remove the wdp/ directory (must be empty)
          rclone rmdir "r2:$BUCKET/wdp" 2>/dev/null || echo "wdp/ already removed or not empty"

          echo "Cleanup complete. WDP snapshots are now at bucket root."

      - name: Verify move
        run: |
          BUCKET="${{ secrets.R2_BUCKET }}"
          echo "Root snapshots.json entries:"
          rclone cat "r2:$BUCKET/snapshots.json" | jq -r '.[]' | head -5
          echo "Root wdpsnapshot_*.png files:"
          rclone lsf "r2:$BUCKET/wdpsnapshot_*.png" | head -5
          echo "wdp/ prefix should be gone:"
          rclone lsd "r2:$BUCKET/" | grep -q wdp && echo "wdp/ still exists!" || echo "wdp/ removed successfully"
