name: Generate Timelapse GIF

on:
  workflow_dispatch:
  # schedule:
  #   - cron: '0 0 * * *'   # Uncomment for daily generation

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg jq bc curl

      - name: Generate GIF
        run: bash generate-gif.sh
        env:
          # These are only needed if the bucket does not allow public listing.
          # Set them as secrets in your GitHub repository.
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}

      - name: Upload GIF as artifact
        uses: actions/upload-artifact@v4
        with:
          name: timelapse
          path: ${{ github.workspace }}/*.gif
