name: Generate GIF

on:
  workflow_dispatch:

jobs:
  make-gif:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (for script and config)
        uses: actions/checkout@v4

      - name: Install ImageMagick, rclone, bc, jq, gifsicle
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick bc jq gifsicle
          curl -O https://downloads.rclone.org/rclone-current-linux-amd64.deb
          sudo dpkg -i rclone-current-linux-amd64.deb
          rm rclone-current-linux-amd64.deb
          
      - name: Generate GIF
        run: bash generate-gif.sh gif-config.json
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          
      - name: Commit and push GIF
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add *.gif
          git diff --staged --quiet || git commit -m "Add generated GIF"
          git push
