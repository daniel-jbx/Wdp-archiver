name: PNG Compression Test (Indexed + Transparency)

on:
  workflow_dispatch:  # manual trigger

# Grant write permission for the repo
permissions:
  contents: write

jobs:
  compress-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (including download script)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed for committing

      - name: Install ImageMagick & pngquant
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick pngquant

      - name: Run tile download & stitch
        run: bash download-and-stitch.sh

      - name: Compress output.png to 64-color indexed PNG
        run: |
          # Rename original for size comparison
          mv output.png original_output.png
          pngquant --quality=80-100 --speed=1 --force --verbose 64 original_output.png --output output.png
          echo "Original size:"
          ls -lh original_output.png
          echo "Compressed size:"
          ls -lh output.png

      - name: Prepare test file with timestamp
        run: |
          TIMESTAMP=$(date -u +'%Y%m%d_%H%M%S')
          mkdir -p test-snapshots
          cp output.png test-snapshots/stitched_${TIMESTAMP}.png
          echo "Created test-snapshots/stitched_${TIMESTAMP}.png"

      - name: Commit and push test PNG to repo
        run: |
          git config user.name "GitHub Actions (test)"
          git config user.email "actions@github.com"
          git add test-snapshots/
          # Only commit if there are changes
          if git diff --cached --quiet; then
            echo "No new snapshot to commit."
          else
            git commit -m "Test: add compressed indexed PNG snapshot [skip ci]"
            git push origin HEAD:main
          fi
