name: Reset backfill state to 2026-03-03

on:
  workflow_dispatch:

jobs:
  reset:
    runs-on: ubuntu-latest
    steps:
      - name: Install rclone
        run: sudo apt-get update && sudo apt-get install -y rclone

      - name: Configure rclone for R2
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf <<EOF
          [r2]
          type = s3
          provider = Cloudflare
          access_key_id = ${{ secrets.R2_ACCESS_KEY_ID }}
          secret_access_key = ${{ secrets.R2_SECRET_ACCESS_KEY }}
          endpoint = ${{ secrets.R2_ENDPOINT }}
          region = auto
          EOF

      - name: Reset state files
        run: |
          echo "2026-03-03" > /tmp/wdp_state.txt
          echo "2026-03-03" > /tmp/ant_state.txt
          rclone copyto /tmp/wdp_state.txt "r2:${{ secrets.R2_BUCKET }}/wdp-backfill-state.txt"
          rclone copyto /tmp/ant_state.txt "r2:${{ secrets.R2_BUCKET }}/antarktika-backfill-state.txt"
          echo "✅ States reset to 2026-03-03"

      - name: Verify
        run: |
          echo "WDP state:"
          rclone cat "r2:${{ secrets.R2_BUCKET }}/wdp-backfill-state.txt"
          echo "Antarktika state:"
          rclone cat "r2:${{ secrets.R2_BUCKET }}/antarktika-backfill-state.txt"
