name: Rebuild antarktika snapshots.json

on:
  workflow_dispatch:

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Install rclone and jq
        run: |
          sudo apt-get update
          sudo apt-get install -y rclone jq

      - name: Configure rclone for R2
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf <<EOF
          [r2]
          type = s3
          provider = Cloudflare
          access_key_id = ${{ secrets.R2_ACCESS_KEY_ID }}
          secret_access_key = ${{ secrets.R2_SECRET_ACCESS_KEY }}
          endpoint = ${{ secrets.R2_ENDPOINT }}
          region = auto
          EOF

      - name: List antarktika snapshot files
        run: |
          BUCKET="${{ secrets.R2_BUCKET }}"
          # Use rclone ls with --include (wildcard works correctly)
          rclone ls "r2:$BUCKET/antarktika/" --include "antarktika_snapshot_*.png" | awk '{print $2}' > /tmp/files.txt
          echo "Found $(wc -l < /tmp/files.txt) files."
          echo "Files:"
          cat /tmp/files.txt

      - name: Build and upload manifest
        run: |
          BUCKET="${{ secrets.R2_BUCKET }}"
          # Create JSON array from the list
          jq -R -s 'split("\n") | map(select(length>0))' /tmp/files.txt > /tmp/manifest.json
          echo "Manifest has $(jq length /tmp/manifest.json) entries."
          rclone copyto /tmp/manifest.json "r2:$BUCKET/antarktika/snapshots.json"

      - name: Verify
        run: |
          BUCKET="${{ secrets.R2_BUCKET }}"
          echo "--- antarktika/snapshots.json ---"
          rclone cat "r2:$BUCKET/antarktika/snapshots.json" | jq -r '.[]' | head -10
