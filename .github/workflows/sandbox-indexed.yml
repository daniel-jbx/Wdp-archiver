name: Sandbox - Test Palette from Latest Snapshot

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout assets branch
        uses: actions/checkout@v4
        with:
          ref: assets

      - name: Extract palette from latest snapshot and create test copy
        run: |
          # Find the newest RGBA snapshot (the one you know is transparent)
          LATEST=$(ls -1 wdpsnapshot_*.png | tail -n 1)
          echo "Latest snapshot: $LATEST"

          # Generate a palette from this snapshot (includes transparent index!)
          convert "$LATEST" -unique-colors +append palette_from_snapshot.png
          echo "Palette created."

          # Create test copy
          cp "$LATEST" "TEST_indexed_${LATEST}"
          # Remap with the custom palette
          convert "TEST_indexed_${LATEST}" -remap palette_from_snapshot.png -type Palette PNG8:"TEST_indexed_${LATEST}"
          echo "Test file created: TEST_indexed_${LATEST}"

      - name: Commit test file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add TEST_indexed_*.png
          if ! git diff --cached --quiet; then
            git commit -m "Sandbox: palette from latest RGBA snapshot"
            git push origin assets
          else
            echo "No changes"
          fi
