name: Cleanup May 29 Snapshot

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Install rclone
        run: curl https://rclone.org/install.sh | sudo bash

      - name: Configure rclone
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf <<EOF
          [r2]
          type = s3
          provider = Cloudflare
          access_key_id = ${{ secrets.R2_ACCESS_KEY_ID }}
          secret_access_key = ${{ secrets.R2_SECRET_ACCESS_KEY }}
          endpoint = ${{ secrets.R2_ENDPOINT }}
          acl = private
          no_check_bucket = true
          bucket = ${{ secrets.R2_BUCKET }}
          EOF

      - name: Remove May 29 snapshot from R2 and snapshots.json
        run: |
          SNAPSHOT="wdpsnapshot_20260529_001515.png"
          # Delete from bucket
          rclone deletefile "r2:${{ secrets.R2_BUCKET }}/$SNAPSHOT" || echo "File not found"
          # Remove from manifest
          rclone cat "r2:${{ secrets.R2_BUCKET }}/snapshots.json" | jq 'map(select(. != "'$SNAPSHOT'"))' > cleaned.json
          rclone copyto cleaned.json "r2:${{ secrets.R2_BUCKET }}/snapshots.json"
          echo "Cleaned up. Now re-run the backfill workflow."
