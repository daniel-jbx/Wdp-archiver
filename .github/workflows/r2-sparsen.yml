name: R2 Sparsen (1 per hour)

on:
  workflow_dispatch:   # manual trigger only

permissions:
  contents: read       # no need to write to repo, only R2

jobs:
  sparsen:
    runs-on: ubuntu-latest
    steps:
      - name: Install rclone
        run: |
          curl -O https://downloads.rclone.org/rclone-current-linux-amd64.deb
          sudo dpkg -i rclone-current-linux-amd64.deb
          rm rclone-current-linux-amd64.deb

      - name: Run sparsening (keep 1 per hour)
        run: |
          set -euo pipefail

          BUCKET="${{ secrets.R2_BUCKET }}"
          echo "Working on bucket: $BUCKET"

          # List all snapshot PNGs from R2
          echo "Fetching file list from R2..."
          rclone lsf ":s3:${BUCKET}" \
            --s3-provider="Cloudflare" \
            --s3-endpoint="${{ secrets.R2_ENDPOINT }}" \
            --s3-access-key-id="${{ secrets.R2_ACCESS_KEY_ID }}" \
            --s3-secret-access-key="${{ secrets.R2_SECRET_ACCESS_KEY }}" \
            --s3-no-check-bucket \
            --include "wdpsnapshot_*.png" > all_snapshots.txt

          total=$(wc -l < all_snapshots.txt)
          echo "Total snapshots found: $total"

          if [ "$total" -eq 0 ]; then
            echo "No snapshots to process."
            exit 0
          fi

          # Group by hour (YYYYMMDD_HH)
          declare -A HOUR_GROUPS

          while IFS= read -r file; do
            # Extract date and hour from filename
            if [[ $file =~ wdpsnapshot_([0-9]{8})_([0-9]{2})[0-9]{4}\.png$ ]]; then
              date_part="${BASH_REMATCH[1]}"   # YYYYMMDD
              hour_part="${BASH_REMATCH[2]}"   # HH
              hour_key="${date_part}_${hour_part}"
              HOUR_GROUPS["$hour_key"]+="$file "
            else
              echo "Warning: skipping unexpected file: $file"
            fi
          done < all_snapshots.txt

          echo "Found ${#HOUR_GROUPS[@]} unique hours."

          # Determine which files to delete (all but the earliest per hour)
          TO_DELETE=()
          for hour in "${!HOUR_GROUPS[@]}"; do
            IFS=' ' read -r -a snaps <<< "${HOUR_GROUPS[$hour]}"
            # Sort lexicographically – filename includes HHMMSS so earliest first
            IFS=$'\n' sorted=($(sort <<<"${snaps[*]}"))
            unset IFS
            # Keep first, delete rest
            if [ ${#sorted[@]} -gt 1 ]; then
              for ((i=1; i<${#sorted[@]}; i++)); do
                TO_DELETE+=("${sorted[$i]}")
              done
            fi
          done

          if [ ${#TO_DELETE[@]} -gt 0 ]; then
            echo "Deleting ${#TO_DELETE[@]} snapshots from R2..."
            # Delete one by one (rclone delete supports multiple but this is clearer)
            for file in "${TO_DELETE[@]}"; do
              echo "  Deleting: $file"
              rclone delete ":s3:${BUCKET}/${file}" \
                --s3-provider="Cloudflare" \
                --s3-endpoint="${{ secrets.R2_ENDPOINT }}" \
                --s3-access-key-id="${{ secrets.R2_ACCESS_KEY_ID }}" \
                --s3-secret-access-key="${{ secrets.R2_SECRET_ACCESS_KEY }}" \
                --s3-no-check-bucket
            done
            echo "Sparsen complete. Deleted ${#TO_DELETE[@]} files."
          else
            echo "No extra snapshots to delete. Already 1 per hour."
          fi

          # Optionally regenerate snapshots.json after cleanup
          echo "Regenerating snapshots.json..."
          rclone lsf ":s3:${BUCKET}" \
            --s3-provider="Cloudflare" \
            --s3-endpoint="${{ secrets.R2_ENDPOINT }}" \
            --s3-access-key-id="${{ secrets.R2_ACCESS_KEY_ID }}" \
            --s3-secret-access-key="${{ secrets.R2_SECRET_ACCESS_KEY }}" \
            --s3-no-check-bucket \
            --include "wdpsnapshot_*.png" | sort | jq -R . | jq -s . > snapshots.json

          # Upload the new snapshots.json to R2 (overwrite)
          rclone copyto snapshots.json ":s3:${BUCKET}/snapshots.json" \
            --s3-provider="Cloudflare" \
            --s3-endpoint="${{ secrets.R2_ENDPOINT }}" \
            --s3-access-key-id="${{ secrets.R2_ACCESS_KEY_ID }}" \
            --s3-secret-access-key="${{ secrets.R2_SECRET_ACCESS_KEY }}" \
            --s3-no-check-bucket

          echo "snapshots.json updated in R2."
