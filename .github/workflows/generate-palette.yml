name: Generate Wplace Palette

on:
  workflow_dispatch:   # you trigger it manually

jobs:
  build-palette:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout assets branch
        uses: actions/checkout@v4
        with:
          ref: assets

      - name: Install ImageMagick
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - name: Find latest snapshot and extract palette
        run: |
          # Find the newest snapshot (files are named with timestamps, sorted alphabetically)
          LATEST=$(ls -1 wdpsnapshot_*.png | tail -n 1)
          echo "Using snapshot: $LATEST"
          # Extract all unique colours and make a 1‑row strip
          convert "$LATEST" -unique-colors +append palette.png
          echo "Palette created. Number of colours:"
          identify palette.png

      - name: Commit palette.png to assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add palette.png
          if ! git diff --cached --quiet; then
            git commit -m "Add wplace colour palette"
            git push origin assets
          else
            echo "palette.png unchanged"
          fi
