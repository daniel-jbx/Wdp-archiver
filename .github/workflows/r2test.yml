name: Test R2 Connection

on:
  workflow_dispatch:   # you trigger it manually from the Actions tab

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Install rclone
        run: |
          curl -O https://downloads.rclone.org/rclone-current-linux-amd64.deb
          sudo dpkg -i rclone-current-linux-amd64.deb
          rm rclone-current-linux-amd64.deb

      - name: Test R2 connection (using env vars)
        run: |
          export RCLONE_S3_PROVIDER="Cloudflare"
          export RCLONE_S3_ENDPOINT="$R2_ENDPOINT"
          export RCLONE_S3_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID"
          export RCLONE_S3_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY"
          rclone lsd myr2: --s3-no-check-bucket --verbose
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
