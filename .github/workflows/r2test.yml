name: Test R2 Connection

on:
  workflow_dispatch:   # you trigger it manually from the Actions tab

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Install rclone
        run: |
          curl -O https://downloads.rclone.org/rclone-current-linux-amd64.deb
          sudo dpkg -i rclone-current-linux-amd64.deb
          rm rclone-current-linux-amd64.deb

      - name: Debug endpoint (check length)
        run: |
          echo "Endpoint length (number of characters): ${#R2_ENDPOINT}"
          # Print first few characters; GitHub will mask if it matches a secret
          echo "First 10 chars (masked if secret): ${R2_ENDPOINT:0:10}"
        env:
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}

      - name: Test R2 connection
        run: |
          rclone lsd ":s3,provider=Cloudflare,access_key_id=$R2_ACCESS_KEY_ID,secret_access_key=$R2_SECRET_ACCESS_KEY,endpoint=$R2_ENDPOINT:" \
            --s3-no-check-bucket \
            --verbose
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
