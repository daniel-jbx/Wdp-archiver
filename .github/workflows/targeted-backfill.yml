name: Targeted Backfill (Jan 10 – May 11 + May 26-28)

on:
  schedule:
    - cron: '20 */6 * * *'
  workflow_dispatch:

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq imagemagick pngquant curl
          curl https://rclone.org/install.sh | sudo bash

      - name: Configure rclone for Cloudflare R2
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf <<EOF
          [r2]
          type = s3
          provider = Cloudflare
          access_key_id = ${{ secrets.R2_ACCESS_KEY_ID }}
          secret_access_key = ${{ secrets.R2_SECRET_ACCESS_KEY }}
          endpoint = ${{ secrets.R2_ENDPOINT }}
          acl = private
          no_check_bucket = true
          bucket = ${{ secrets.R2_BUCKET }}
          EOF

      - name: Run backfill script
        env:
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash targeted-backfill.sh

      - name: Upload progress state
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backfill-progress
          path: backfill-progress.json
