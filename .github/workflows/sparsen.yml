name: Purge Assets (safe push)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  purge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout assets branch
        uses: actions/checkout@v4
        with:
          ref: assets
          fetch-depth: 1   # we only need the latest commit

      - name: Purge deprecated snapshots and force push
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          mapfile -t ALL < <(ls -1 wdpsnapshot_*.png 2>/dev/null | sort)
          NOW_EPOCH=$(date +%s)

          get_epoch() {
              local f="$1"
              local ts_part="${f#*snapshot_}"
              ts_part="${ts_part%.png}"
              local ts_fmt="${ts_part:0:4}-${ts_part:4:2}-${ts_part:6:2} ${ts_part:9:2}:${ts_part:11:2}:${ts_part:13:2}"
              date -d "$ts_fmt" +%s 2>/dev/null || echo "0"
          }

          declare -A HOUR_GROUPS
          for f in "${ALL[@]}"; do
              epoch=$(get_epoch "$f")
              if [ "$epoch" -eq 0 ]; then continue; fi
              hour_key=$(date -d "@$epoch" +"%Y%m%d_%H")
              HOUR_GROUPS["$hour_key"]+="$f "
          done

          KEPT=()

          for hour in "${!HOUR_GROUPS[@]}"; do
              snaps=($(echo ${HOUR_GROUPS[$hour]} | tr ' ' '\n' | sort))
              first_epoch=$(get_epoch "${snaps[0]}")
              age_sec=$(( NOW_EPOCH - first_epoch ))
              age_hrs=$(( age_sec / 3600 ))

              keep=0
              if [ "$age_hrs" -le 72 ]; then
                  keep=${#snaps[@]}
              elif [ "$age_hrs" -le 168 ]; then
                  keep=4
              else
                  keep=1
              fi

              if [ ${#snaps[@]} -gt $keep ]; then
                  delete=("${snaps[@]:0:$((${#snaps[@]} - keep))}")
                  for f in "${delete[@]}"; do
                      git rm "$f"
                      echo "Deleted $f"
                  done
              fi

              for ((i=$((${#snaps[@]} - keep)); i<${#snaps[@]}; i++)); do
                  KEPT+=("${snaps[$i]}")
              done
          done

          # Update snapshots.json
          printf '%s\n' "${KEPT[@]}" | jq -R . | jq -s . > snapshots.json
          git add snapshots.json

          # Remove _deprecated if present
          if [ -d "_deprecated" ]; then
              git rm -r _deprecated
              echo "Removed _deprecated folder"
          fi

          # Commit the removals
          git commit -m "Purge old snapshots: keep 4/hr after 72h, 1/hr after 7d" || echo "Nothing to commit"

          # Force push – this will be tiny because blobs are already on server
          git push origin --force assets
