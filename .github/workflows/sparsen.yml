name: Daily Sparsen Snapshots (1 per hour)
on:
  workflow_dispatch:   # manual trigger for testing
  schedule:
    - cron: '0 1 * * *'   # run daily at 01:00 UTC

# Give the workflow write access to the repository
permissions:
  contents: write

# Silence Node.js 20 deprecation warning (optional)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sparsen:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout assets branch
        uses: actions/checkout@v4
        with:
          ref: assets
          fetch-depth: 1

      - name: Sparsen to 1 snapshot per hour
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # List all snapshots in chronological order
          mapfile -t ALL < <(ls -1 wdpsnapshot_*.png 2>/dev/null | sort)

          # Helper: extract epoch timestamp from filename
          get_epoch() {
            local f="$1"
            local ts_part="${f#*snapshot_}"
            ts_part="${ts_part%.png}"
            local ts_fmt="${ts_part:0:4}-${ts_part:4:2}-${ts_part:6:2} ${ts_part:9:2}:${ts_part:11:2}:${ts_part:13:2}"
            date -d "$ts_fmt" +%s 2>/dev/null || echo "0"
          }

          # Group by hour (YYYYMMDD_HH)
          declare -A HOUR_GROUPS
          for f in "${ALL[@]}"; do
            epoch=$(get_epoch "$f")
            [ "$epoch" -eq 0 ] && continue
            hour_key=$(date -d "@$epoch" +"%Y%m%d_%H")
            HOUR_GROUPS["$hour_key"]+="$f "
          done

          # Determine which files to delete
          TO_DELETE=()
          for hour in "${!HOUR_GROUPS[@]}"; do
            IFS=' ' read -r -a snaps <<< "${HOUR_GROUPS[$hour]}"
            # Sort by epoch ascending (earliest first)
            IFS=$'\n' sorted=($(sort <<<"${snaps[*]}"))
            unset IFS
            # Keep only the first (earliest) snapshot
            if [ ${#sorted[@]} -gt 1 ]; then
              for ((i=1; i<${#sorted[@]}; i++)); do
                TO_DELETE+=("${sorted[$i]}")
              done
            fi
          done

          # Delete extra files
          if [ ${#TO_DELETE[@]} -gt 0 ]; then
            git rm "${TO_DELETE[@]}"
            echo "Deleted ${#TO_DELETE[@]} snapshots"
          else
            echo "No snapshots to delete"
          fi

          # Rebuild snapshots.json with remaining files
          ls -1 wdpsnapshot_*.png 2>/dev/null | jq -R . | jq -s . > snapshots.json
          git add snapshots.json

          # Commit and push only if there are changes
          if ! git diff --cached --quiet; then
            git commit -m "Sparsen to 1 snapshot per hour"
            git push origin assets
          else
            echo "No changes to commit"
          fi
