name: Test Jan 12 Streaming Extraction

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y curl jq imagemagick pngquant

      - name: Install rclone
        run: curl https://rclone.org/install.sh | sudo bash

      - name: Configure rclone
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf <<EOF
          [r2]
          type = s3
          provider = Cloudflare
          access_key_id = ${{ secrets.R2_ACCESS_KEY_ID }}
          secret_access_key = ${{ secrets.R2_SECRET_ACCESS_KEY }}
          endpoint = ${{ secrets.R2_ENDPOINT }}
          acl = private
          no_check_bucket = true
          bucket = ${{ secrets.R2_BUCKET }}
          EOF

      - name: Process Jan 12 release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="world-2026-01-12T23-09-39.222Z"
          echo "Processing $TAG"
          # Fetch split part URLs
          asset_urls=$(curl -s -L -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/murolem/wplace-archives/releases/tags/$TAG" \
            | jq -r '.assets[].browser_download_url' | grep '\.tar\.gz\.')
          if [[ -z "$asset_urls" ]]; then
            echo "No split parts found"
            exit 1
          fi
          # Tile range
          X_START=1225; X_END=1231; Y_START=513; Y_END=518
          TILE_COLS=$((X_END - X_START + 1))
          TILE_ROWS=$((Y_END - Y_START + 1))
          # Temp dir
          temp_dir=$(mktemp -d)
          cd "$temp_dir"
          # Build patterns (match any top directory)
          patterns=()
          for x in $(seq $X_START $X_END); do
            for y in $(seq $Y_START $Y_END); do
              patterns+=("*/$x/$y.png")
            done
          done
          mkdir tiles
          # Stream extract
          echo "Streaming and extracting..."
          (
            for url in $asset_urls; do
              curl -L -s --fail "$url"
            done
          ) | tar -xz --strip-components=1 -C tiles --wildcards "${patterns[@]}" 2>/dev/null || true
          # Count extracted
          extracted=$(find tiles -name "*.png" | wc -l)
          echo "Extracted $extracted tiles (expected up to 42)"
          # Build list of expected tile files (with placeholders for missing)
          tile_files=()
          for y in $(seq $Y_START $Y_END); do
            for x in $(seq $X_START $X_END); do
              f="tiles/$x/$y.png"
              if [[ ! -f "$f" ]]; then
                mkdir -p "$(dirname "$f")"
                convert -size 1000x1000 xc:none "$f"
              fi
              tile_files+=("$f")
            done
          done
          # Stitch
          montage "${tile_files[@]}" -tile ${TILE_COLS}x${TILE_ROWS} -geometry 1000x1000+0+0 stitched.png
          pngquant --quality=80-100 --speed=1 --force 64 stitched.png --output compressed.png
          # Upload to R2
          rclone copyto compressed.png "r2:${{ secrets.R2_BUCKET }}/test_jan12_streamed.png"
          echo "Uploaded test_jan12_streamed.png"
