name: Compute Snapshot Diffs (Inverted Index)

on:
  workflow_run:
    workflows: ["update-map"]
    types:
      - completed
  push:
    paths:
      - 'snapshots.json'
  workflow_dispatch:

jobs:
  compute-diffs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq imagemagick curl
          curl https://rclone.org/install.sh | sudo bash

      - name: Configure rclone for R2
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf <<EOF
          [r2]
          type = s3
          provider = Cloudflare
          endpoint = ${{ secrets.R2_ENDPOINT }}
          access_key_id = ${{ secrets.R2_ACCESS_KEY_ID }}
          secret_access_key = ${{ secrets.R2_SECRET_ACCESS_KEY }}
          no_check_bucket = true
          EOF

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python packages
        run: pip install pillow numpy

      - name: Compute inverted index diffs
        run: |
          set -euo pipefail
          BUCKET="r2:${{ secrets.R2_BUCKET }}"

          # Download snapshots.json
          rclone cat "$BUCKET/snapshots.json" > snapshots.json
          TOTAL=$(jq '. | length' snapshots.json)

          # Load existing diffs.json (if any) – we'll overwrite, but for incremental we'd merge.
          # For simplicity on first run, we start fresh. To enable incremental, we'd need to compute only new snapshots.
          # Since this workflow runs after each update-map, we'll compute from scratch each time.
          # If you want incremental, we can modify later.
          echo "{}" > diffs.json

          NEEDED=$((TOTAL - 1))
          if [ $NEEDED -le 0 ]; then
            echo "Not enough snapshots (need at least 2)."
            exit 0
          fi

          python3 <<EOF
          import json, subprocess, os
          from PIL import Image
          import numpy as np

          with open("snapshots.json") as f:
              snapshots = json.load(f)

          # Load existing diffs if they exist (for incremental, but here we start empty)
          try:
              with open("diffs.json") as f:
                  diffs = json.load(f)
          except:
              diffs = {}

          # We'll compute diffs for all snapshot pairs.
          # To be incremental, we could compare existing keys vs new snapshots.
          # For simplicity, we rebuild from scratch each run (still only runs after updates).
          for i in range(len(snapshots) - 1):
              prev_name = snapshots[i]
              curr_name = snapshots[i+1]

              print(f"Processing {prev_name} -> {curr_name} (pair {i+1}/{len(snapshots)-1})")
              subprocess.run(["rclone", "copyto", f"$BUCKET/{prev_name}", "prev.png"], check=True)
              subprocess.run(["rclone", "copyto", f"$BUCKET/{curr_name}", "curr.png"], check=True)

              prev = np.array(Image.open("prev.png").convert("RGBA"))
              curr = np.array(Image.open("curr.png").convert("RGBA"))
              diff_mask = np.any(curr != prev, axis=2)
              changed = np.argwhere(diff_mask)   # (y, x)

              # Record the snapshot index (i+1) for each changed pixel
              for y, x in changed:
                  key = f"{int(x)},{int(y)}"
                  if key not in diffs:
                      diffs[key] = []
                  # Only add if not already the last index (avoid duplicates if same pixel changes in consecutive pairs)
                  if not diffs[key] or diffs[key][-1] != i+1:
                      diffs[key].append(i+1)

              os.remove("prev.png")
              os.remove("curr.png")

          with open("diffs.json", "w") as f:
              json.dump(diffs, f)
          EOF

          # Upload diffs.json (optionally gzip compress)
          rclone copyto diffs.json "$BUCKET/diffs.json"
          echo "diffs.json uploaded successfully (inverted index)."
