name: Rename Specific Old Snapshots

on:
  workflow_dispatch:

jobs:
  rename:
    runs-on: ubuntu-latest
    steps:
      - name: Install rclone
        run: curl https://rclone.org/install.sh | sudo bash

      - name: Configure rclone
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf <<EOF
          [r2]
          type = s3
          provider = Cloudflare
          access_key_id = ${{ secrets.R2_ACCESS_KEY_ID }}
          secret_access_key = ${{ secrets.R2_SECRET_ACCESS_KEY }}
          endpoint = ${{ secrets.R2_ENDPOINT }}
          acl = private
          no_check_bucket = true
          bucket = ${{ secrets.R2_BUCKET }}
          EOF

      - name: Rename selected files
        run: |
          # Replace these with the actual filenames you want to hide
          FILES_TO_RENAME=(
            "wdpsnapshot_20260509_225431.png"
            "wdpsnapshot_20260509_230547.png"
            "wdpsnapshot_20260510_005227.png"
            "wdpsnapshot_20260510_020255.png"
            "wdpsnapshot_20260510_032340.png"
            "wdpsnapshot_20260510_043249.png"
            "wdpsnapshot_20260510_053106.png"
            "wdpsnapshot_20260510_065445.png"
            "wdpsnapshot_20260510_073048.png"
            "wdpsnapshot_20260510_083054.png"
            "wdpsnapshot_20260510_093054.png"
            "wdpsnapshot_20260510_103052.png"
            "wdpsnapshot_20260510_115542.png"
            "wdpsnapshot_20260510_123056.png"
            "wdpsnapshot_20260510_133115.png"
            "wdpsnapshot_20260510_145715.png"
            "wdpsnapshot_20260510_155051.png"
            "wdpsnapshot_20260510_165053.png"
            "wdpsnapshot_20260510_175052.png"
            "wdpsnapshot_20260510_185048.png"
            "wdpsnapshot_20260510_195054.png"
            "wdpsnapshot_20260510_205057.png"
            "wdpsnapshot_20260510_215058.png"
            "wdpsnapshot_20260510_224100.png"
            "wdpsnapshot_20260510_235056.png"
          )
          for file in "${FILES_TO_RENAME[@]}"; do
            echo "Renaming $file -> old_$file"
            rclone moveto "r2:${{ secrets.R2_BUCKET }}/$file" "r2:${{ secrets.R2_BUCKET }}/old_$file"
          done

      - name: Rebuild snapshots.json (only from remaining wdpsnapshot_*.png)
        run: |
          rclone lsjson "r2:${{ secrets.R2_BUCKET }}/" --files-only --include "wdpsnapshot_*.png" | jq -r 'map(.Name) | sort' > snapshots.json
          rclone copyto snapshots.json "r2:${{ secrets.R2_BUCKET }}/snapshots.json"
          echo "Updated snapshots.json"
