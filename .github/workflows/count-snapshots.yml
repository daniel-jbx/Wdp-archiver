name: Count snapshots per date

on:
  workflow_dispatch:

jobs:
  count:
    runs-on: ubuntu-latest
    steps:
      - name: Install jq and curl (optional, Python uses curl directly)
        run: sudo apt-get update && sudo apt-get install -y curl

      - name: Fetch all releases and count per date
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'EOF'
          import json, subprocess, sys, time
          from collections import defaultdict

          token = "${{ secrets.GITHUB_TOKEN }}"
          headers = []
          if token:
              headers = ["-H", f"Authorization: token {token}"]

          page = 1
          counts = defaultdict(int)

          while True:
              print(f"Fetching page {page}...", file=sys.stderr)
              url = f"https://api.github.com/repos/murolem/wplace-archives/releases?page={page}&per_page=100"
              cmd = ["curl", "-s", "-L"] + headers + [url]
              result = subprocess.run(cmd, capture_output=True, text=True)
              if result.returncode != 0:
                  print(f"Error: {result.stderr}", file=sys.stderr)
                  break
              try:
                  data = json.loads(result.stdout)
              except json.JSONDecodeError:
                  print(f"Invalid JSON on page {page}", file=sys.stderr)
                  break
              if not data:
                  break
              for release in data:
                  tag = release.get("tag_name", "")
                  if tag.startswith("world-"):
                      # Extract YYYY-MM-DD from tag
                      parts = tag.split('-')
                      if len(parts) >= 3:
                          date = f"{parts[1]}-{parts[2]}-{parts[3][:2]}"  # world-2026-01-10...
                          if len(date) == 10:
                              counts[date] += 1
              page += 1
              if page > 200:
                  break
              time.sleep(0.5)

          print("\nDate       | Snapshots")
          print("-----------|----------")
          for date in sorted(counts.keys()):
              print(f"{date} | {counts[date]}")
          EOF
