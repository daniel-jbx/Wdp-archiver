name: Update Map Snapshot

concurrency:
  # Use a shared group if your daily sparsening workflow also uses this name
  # so that only one of them runs at a time.
  group: assets-branch-update
  cancel-in-progress: false   # queue instead of cancel

on:
  workflow_dispatch:
  # schedule:   # uncomment when ready
  #   - cron: '*/5 * * * *'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout assets (sparse – only script)
        uses: actions/checkout@v4
        with:
          ref: assets
          fetch-depth: 1
          sparse-checkout: |
            download-and-stitch.sh
          sparse-checkout-cone-mode: false

      - name: Install ImageMagick
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - name: Download and stitch tiles
        run: bash download-and-stitch.sh

      - name: Commit new snapshot and update list
        run: |
          TIMESTAMP=$(date -u +'%Y%m%d_%H%M%S')
          mv output.png "wdpsnapshot_${TIMESTAMP}.png"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Stage the new snapshot
          git add --sparse "wdpsnapshot_${TIMESTAMP}.png"

          # Pull in any remote changes (e.g., daily sparsening) and rebase
          git pull --rebase origin assets

          # Rebuild snapshots.json from the current index (includes new snapshot
          # and excludes any files that were deleted by the sparsening)
          python3 << 'EOF'
          import subprocess, json
          files = sorted(
              subprocess.check_output(
                  ['git', 'ls-files', 'wdpsnapshot_*.png'],
                  text=True
              ).strip().split('\n')
          )
          with open('snapshots.json', 'w') as f:
              json.dump(files, f)
          EOF

          git add --sparse snapshots.json
          git commit -m "Snapshot ${TIMESTAMP} UTC" || echo "No changes"
          git push origin assets
