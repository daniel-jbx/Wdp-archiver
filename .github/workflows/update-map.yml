name: Update Map Snapshot

concurrency:
  group: update-map-snapshot
  cancel-in-progress: false   # queue, don't cancel – exactly what you need for 5-minute cron

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout assets (sparse – only the script)
        uses: actions/checkout@v4
        with:
          ref: assets
          fetch-depth: 1
          sparse-checkout: |
            download-and-stitch.sh

      - name: Install ImageMagick
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - name: Download and stitch tiles
        run: bash download-and-stitch.sh

      - name: Commit new snapshot and update list
        run: |
          TIMESTAMP=$(date -u +'%Y%m%d_%H%M%S')
          mv output.png "wdpsnapshot_${TIMESTAMP}.png"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Stage the new PNG – this adds it to Git's index without downloading old blobs
          git add "wdpsnapshot_${TIMESTAMP}.png"

          # Build the complete JSON list from the Git index (not the filesystem)
          python3 -c "
          import subprocess, json
          files = sorted(
              subprocess.check_output(
                  ['git', 'ls-files', 'wdpsnapshot_*.png'],
                  text=True
              ).strip().split('\n')
          )
          with open('snapshots.json', 'w') as f:
              json.dump(files, f)
          "

          git add snapshots.json
          git commit -m "Snapshot ${TIMESTAMP} UTC" || echo "No changes"
          git push origin assets
