name: Update Map Snapshot

on:
  workflow_dispatch:
  # schedule: (add your cron when ready)

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch (to get download-and-stitch.sh)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
          sparse-checkout: |
            download-and-stitch.sh
          sparse-checkout-cone-mode: false

      - name: Install ImageMagick and rclone
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick
          curl -O https://downloads.rclone.org/rclone-current-linux-amd64.deb
          sudo dpkg -i rclone-current-linux-amd64.deb
          rm rclone-current-linux-amd64.deb

      - name: Download and stitch tiles
        run: bash download-and-stitch.sh

      - name: Upload snapshot to R2 (and optionally update snapshots.json)
        run: |
          TIMESTAMP=$(date -u +'%Y%m%d_%H%M%S')
          mv output.png "wdpsnapshot_${TIMESTAMP}.png"
          SNAPSHOT_FILE="wdpsnapshot_${TIMESTAMP}.png"

          echo "Uploading ${SNAPSHOT_FILE} to R2..."
          rclone copyto "${SNAPSHOT_FILE}" \
            ":s3:${R2_BUCKET}/${SNAPSHOT_FILE}" \
            --s3-provider="Cloudflare" \
            --s3-endpoint="$R2_ENDPOINT" \
            --s3-access-key-id="$R2_ACCESS_KEY_ID" \
            --s3-secret-access-key="$R2_SECRET_ACCESS_KEY" \
            --s3-no-check-bucket \
            --verbose

          # Optional: Update snapshots.json in R2 immediately (so new snapshot appears in viewer)
          # Fetch current snapshots.json, append new filename, sort, and re-upload
          echo "Updating snapshots.json in R2..."
          rclone cat ":s3:${R2_BUCKET}/snapshots.json" \
            --s3-provider="Cloudflare" \
            --s3-endpoint="$R2_ENDPOINT" \
            --s3-access-key-id="$R2_ACCESS_KEY_ID" \
            --s3-secret-access-key="$R2_SECRET_ACCESS_KEY" 2>/dev/null > current.json || echo "[]" > current.json
          # Append new filename and sort
          python3 << EOF
          import json
          try:
              with open('current.json') as f:
                  files = json.load(f)
          except:
              files = []
          files.append("${SNAPSHOT_FILE}")
          files = sorted(set(files))
          with open('snapshots.json', 'w') as f:
              json.dump(files, f)
          EOF
          rclone copyto snapshots.json ":s3:${R2_BUCKET}/snapshots.json" \
            --s3-provider="Cloudflare" \
            --s3-endpoint="$R2_ENDPOINT" \
            --s3-access-key-id="$R2_ACCESS_KEY_ID" \
            --s3-secret-access-key="$R2_SECRET_ACCESS_KEY" \
            --verbose

          echo "Done. No changes pushed to GitHub assets branch."
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
