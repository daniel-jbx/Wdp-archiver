name: Update Map Snapshot

on:
  workflow_dispatch:
  # schedule: (add your cron when ready)

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch (to get download-and-stitch.sh)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
          sparse-checkout: |
            download-and-stitch.sh
          sparse-checkout-cone-mode: false

      - name: Install ImageMagick, pngquant and rclone
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick pngquant
          curl -O https://downloads.rclone.org/rclone-current-linux-amd64.deb
          sudo dpkg -i rclone-current-linux-amd64.deb
          rm rclone-current-linux-amd64.deb

      - name: Download and stitch tiles
        run: bash download-and-stitch.sh

      - name: Compress to 64-color indexed PNG (preserves transparency)
        run: |
          echo "Original size:"
          ls -lh output.png
          pngquant --quality=80-100 --speed=1 --force --verbose 64 output.png --output output.png
          echo "Compressed size:"
          ls -lh output.png

      - name: Upload snapshot to R2 and fix/update snapshots.json
        run: |
          TIMESTAMP=$(date -u +'%Y%m%d_%H%M%S')
          mv output.png "wdpsnapshot_${TIMESTAMP}.png"
          SNAPSHOT_FILE="wdpsnapshot_${TIMESTAMP}.png"
          echo "Uploading ${SNAPSHOT_FILE} to R2..."
          rclone copyto "${SNAPSHOT_FILE}" \
            ":s3:${R2_BUCKET}/${SNAPSHOT_FILE}" \
            --s3-provider="Cloudflare" \
            --s3-endpoint="$R2_ENDPOINT" \
            --s3-access-key-id="$R2_ACCESS_KEY_ID" \
            --s3-secret-access-key="$R2_SECRET_ACCESS_KEY" \
            --s3-no-check-bucket \
            --verbose

          # Fix and update snapshots.json
          echo "Updating snapshots.json (auto‑repairing if corrupt)..."
          rclone cat ":s3:${R2_BUCKET}/snapshots.json" \
            --s3-provider="Cloudflare" \
            --s3-endpoint="$R2_ENDPOINT" \
            --s3-access-key-id="$R2_ACCESS_KEY_ID" \
            --s3-secret-access-key="$R2_SECRET_ACCESS_KEY" 2>/dev/null > current.json || echo "[]" > current.json

          python3 << EOF
          import json
          with open('current.json') as f:
              try:
                  data = json.load(f)
              except:
                  data = []
          # Ensure data is a list
          if not isinstance(data, list):
              data = []
          # Convert every item to a plain filename string
          cleaned = []
          for item in data:
              if isinstance(item, str):
                  cleaned.append(item)
              elif isinstance(item, dict) and 'filename' in item:
                  cleaned.append(item['filename'])
              # else discard (e.g., numbers, null)
          data = cleaned
          # Append new snapshot if not already present
          new_file = "${SNAPSHOT_FILE}"
          if new_file not in data:
              data.append(new_file)
          with open('snapshots.json', 'w') as f:
              json.dump(data, f)
          EOF

          rclone copyto snapshots.json ":s3:${R2_BUCKET}/snapshots.json" \
            --s3-provider="Cloudflare" \
            --s3-endpoint="$R2_ENDPOINT" \
            --s3-access-key-id="$R2_ACCESS_KEY_ID" \
            --s3-secret-access-key="$R2_SECRET_ACCESS_KEY" \
            --verbose
          echo "Done. snapshots.json is now a clean list of filenames."
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
