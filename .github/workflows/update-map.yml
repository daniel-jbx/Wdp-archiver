name: Update Map Snapshot

on:
  schedule:
    - cron: '0 */3 * * *'   # every 3 hours
  workflow_dispatch:          # allows manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout assets branch
        uses: actions/checkout@v4
        with:
          ref: assets
          # This ensures we fetch the history of the assets branch separately
          fetch-depth: 0

      - name: Download and stitch tiles
        run: bash download-and-stitch.sh
        # This script still outputs 'output.png'

      - name: Rename with timestamp
        run: |
          TIMESTAMP=$(date -u +'%Y%m%d_%H%M%S')
          mv output.png "snapshot_${TIMESTAMP}.png"
          echo "TIMESTAMP=${TIMESTAMP}" >> $GITHUB_ENV

      - name: Commit new snapshot to assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add snapshot_*.png
          # Only commit if there's something new
          if ! git diff --cached --quiet; then
            git commit -m "Snapshot ${TIMESTAMP} UTC"
            git push origin assets
          else
            echo "No new snapshot (no tile changes detected)"
          fi
