name: Update Map Snapshot

concurrency:
  group: update-map-snapshot
  cancel-in-progress: false

on:
  schedule:
    - cron: '3 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout assets branch (sparse – ignore old snapshots)
        uses: actions/checkout@v4
        with:
          ref: assets
          fetch-depth: 0
          sparse-checkout: ['*', '!wdpsnapshot_*.png']

      - name: Configure git credentials
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global credential.helper "!f() { echo \"username=x-access-token\"; echo \"password=${{ secrets.GITHUB_TOKEN }}\"; }; f"

      - name: Install ImageMagick
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - name: Download and stitch tiles
        run: bash download-and-stitch.sh

      - name: Rename with timestamp
        run: |
          TIMESTAMP=$(date -u +'%Y%m%d_%H%M%S')
          mv output.png "wdpsnapshot_${TIMESTAMP}.png"
          echo "TIMESTAMP=${TIMESTAMP}" >> $GITHUB_ENV

      - name: Commit new snapshot to assets
        run: |
          git add wdpsnapshot_*.png
          if ! git diff --cached --quiet; then
            git commit -m "Snapshot ${TIMESTAMP} UTC"
            git pull --rebase origin assets
            git push origin assets
          else
            echo "No changes to commit"
          fi

      - name: Update snapshot list JSON (uses git to see all snapshots)
        run: |
          git ls-files 'wdpsnapshot_*.png' | sort | python3 -c "
import sys, json
files = [line.strip() for line in sys.stdin]
json.dump(files, sys.stdout)
" > snapshots.json

      - name: Commit updated snapshot list
        run: |
          git add snapshots.json
          git commit --allow-empty -m "Update snapshot list"
          git pull --rebase origin assets
          git push origin assets
