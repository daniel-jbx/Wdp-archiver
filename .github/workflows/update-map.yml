name: Update Map Snapshot

concurrency:
  # Use a shared group if your daily sparsening workflow also uses this name
  # so that only one of them runs at a time.
  group: assets-branch-update
  cancel-in-progress: false   # queue instead of cancel

on:
  workflow_dispatch:
  # schedule:   # uncomment when ready
  #   - cron: '*/5 * * * *'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout assets (sparse – only script)
        uses: actions/checkout@v4
        with:
          ref: assets
          fetch-depth: 1
          sparse-checkout: |
            download-and-stitch.sh
          sparse-checkout-cone-mode: false

      - name: Install ImageMagick
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - name: Download and stitch tiles
        run: bash download-and-stitch.sh

      - name: Commit new snapshot and update list
        run: |
          TIMESTAMP=$(date -u +'%Y%m%d_%H%M%S')
          mv output.png "wdpsnapshot_${TIMESTAMP}.png"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # 1. Stage and commit the new snapshot (temporary commit)
          git add --sparse "wdpsnapshot_${TIMESTAMP}.png"
          git commit -m "Snapshot ${TIMESTAMP} UTC (pre-rebase)"

          # 2. Pull latest remote changes and rebase our commit on top
          git pull --rebase origin assets

          # 3. Rebuild snapshots.json from the current index
          python3 << 'EOF'
          import subprocess, json
          files = sorted(
              subprocess.check_output(
                  ['git', 'ls-files', 'wdpsnapshot_*.png'],
                  text=True
              ).strip().split('\n')
          )
          with open('snapshots.json', 'w') as f:
              json.dump(files, f)
          EOF

          git add --sparse snapshots.json

          # 4. Amend the commit to include the updated JSON and final message
          git commit --amend -m "Snapshot ${TIMESTAMP} UTC" --no-edit

          # 5. Push
          git push origin assets

      - name: Upload snapshot to R2 (non-critical)
        if: always()   # run even if previous step failed (though it shouldn't)
        run: |
          TIMESTAMP=$(date -u +'%Y%m%d_%H%M%S')
          FILENAME="wdpsnapshot_${TIMESTAMP}.png"
          if [ -f "$FILENAME" ]; then
            echo "Uploading $FILENAME to R2..."
            rclone copyto "$FILENAME" ":s3:${R2_BUCKET}/${FILENAME}" \
              --s3-provider="Cloudflare" \
              --s3-endpoint="$R2_ENDPOINT" \
              --s3-access-key-id="$R2_ACCESS_KEY_ID" \
              --s3-secret-access-key="$R2_SECRET_ACCESS_KEY" \
              --s3-no-check-bucket \
              --verbose
            echo "Upload complete."
          else
            echo "File $FILENAME not found; skipping upload."
          fi
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
