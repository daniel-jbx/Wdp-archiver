<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>WDP timeline viewer – with pixel diff</title>
  <link rel="stylesheet" href="viewer.css">
  <style>
    /* additional styles for diff mode */
    #diffBtn.active { background-color: #4caf50; }
    #canvas.diff-mode { cursor: crosshair; }
    #doneBtn { background-color: #e74c3c; margin-left: 10px; }
    .diff-nav-info { font-size: 12px; margin-left: 10px; color: #ffaa00; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <canvas id="sel-canvas"></canvas>

  <div id="top-bar">
    <div id="selector-group">
      <select id="interval-select">
        <option value="1440">1 day</option>
        <option value="360">6 hrs</option>
        <option value="60" selected>1 hr</option>
        <option value="15">15 min</option>
        <option value="0">all</option>
      </select>
      <div id="date-group">
        <input type="date" id="date-picker">
        <select id="time-select" style="display:none;">
          <option value="">Select time...</option>
        </select>
      </div>
    </div>
    <span id="timestamp-label-top">--</span>
    <div id="download-group">
      <button class="dl-btn" id="dl-snapshot">snapshot png</button>
      <button class="dl-btn" id="dl-select-toggle">select area</button>
      <button class="dl-btn" id="dl-select-png" style="display:none;">download png</button>
      <button class="dl-btn" id="dl-select-overlay" style="display:none;">download overlay</button>
      <button class="dl-btn" id="diffBtn">diff</button>
      <button class="dl-btn" id="doneBtn" style="display:none;">done</button>
      <span id="coords-display"
            style="display:none;
                   background:rgba(0,0,0,0.7);
                   color:white;
                   padding:4px 8px;
                   border-radius:4px;
                   font-family:monospace;
                   font-size:12px;
                   margin-left:8px;
                   white-space:nowrap;">
      </span>
    </div>
  </div>

  <div id="controls">
    <span id="slider-label">drag to move thru time</span>
    <input type="range" id="slider" min="0" max="0" value="0" step="1">
  </div>

  <script src="viewer.js"></script>
</body>
</html>
