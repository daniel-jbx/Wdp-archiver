<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>wplace.live Timeline Viewer</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
      font-family: sans-serif;
    }
    #canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      touch-action: none;          /* prevents browser gestures on canvas */
      cursor: grab;
    }
    #canvas:active {
      cursor: grabbing;
    }
    #controls {
      position: absolute;
      bottom: 20px;
      left: 5%;
      right: 5%;
      background: rgba(0,0,0,0.75);
      border-radius: 8px;
      padding: 10px 16px;
      color: white;
      display: flex;
      align-items: center;
      gap: 10px;
      box-sizing: border-box;
    }
    #slider {
      flex: 1;
      height: 6px;
      -webkit-appearance: none;
      background: #555;
      border-radius: 3px;
      outline: none;
    }
    #slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 22px;
      height: 22px;
      background: white;
      border-radius: 50%;
      cursor: pointer;
      border: none;
    }
    #timestamp-label {
      font-size: 0.9rem;
      min-width: 140px;
      text-align: right;
      white-space: nowrap;
    }
    #info {
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      background: rgba(0,0,0,0.7);
      padding: 5px 12px;
      border-radius: 4px;
      font-size: 0.8rem;
      pointer-events: none;
      z-index: 10;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="info">Loading snapshots…</div>
  <div id="controls">
    <span style="white-space:nowrap; font-size:0.9rem;">drag to move thru time</span>
    <input type="range" id="slider" min="0" max="0" value="0" step="1">
    <span id="timestamp-label"></span>
  </div>

<script>
  (function() {
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const slider = document.getElementById('slider');
    const label = document.getElementById('timestamp-label');
    const info = document.getElementById('info');

    // ---- High-DPI Sharpness ----
    // Get the device's pixel ratio (1.0 for standard, 2.0 for Retina, etc.)
    const dpr = window.devicePixelRatio || 1;
    // Disable any built-in smoothing
    ctx.imageSmoothingEnabled = false;

    // ---- State ----
    let snapshots = [];
    let currentImage = new Image();
    let currentIndex = -1;
    let requestedIndex = -1;

    // View transform (in CSS pixels)
    let offsetX = 0, offsetY = 0;
    let scale = 1.0;
    const MIN_SCALE = 0.1;
    const MAX_SCALE = 10.0;

    // Pan & Pinch state...
    // (all other state logic remains the same)

    // ---------- Canvas Resize (High-DPI) ----------
    function resize() {
      // 1. Set the canvas's internal resolution (the 'drawing' size) to the real screen pixels
      canvas.width = window.innerWidth * dpr;
      canvas.height = window.innerHeight * dpr;
      
      // 2. Set the canvas's CSS display size to the window's CSS pixel size.
      // This ensures the canvas is "sized" correctly for the browser, but has the internal resolution to draw sharp pixels.
      canvas.style.width = window.innerWidth + 'px';
      canvas.style.height = window.innerHeight + 'px';
      
      drawImage();
    }
    window.addEventListener('resize', resize);

    // ---------- Image loading ----------
    function loadSnapshot(index) {
      if (index < 0 || index >= snapshots.length) return;
      if (index === currentIndex) return;

      requestedIndex = index;

      // Update UI labels immediately
      slider.value = index;
      const filename = snapshots[index];
      const match = filename.match(/(\d{8})_(\d{6})/);
      if (match) {
        const date = match[1];
        const time = match[2];
        label.textContent = `${date.slice(0,4)}-${date.slice(4,6)}-${date.slice(6,8)} ${time.slice(0,2)}:${time.slice(2,4)}:${time.slice(4,6)}`;
      } else {
        label.textContent = filename;
      }

      // Start loading the new image (canvas still shows the old one)
      currentImage.src = snapshots[index];
    }

    currentImage.onload = () => {
      if (currentIndex !== requestedIndex) {
        if (currentIndex === -1) {
          currentIndex = requestedIndex;
          resetView();   // First load: fit to screen
        } else {
          currentIndex = requestedIndex;
          drawImage();   // Preserve existing pan & zoom
        }
      }
    };

    currentImage.onerror = () => {
      console.error('Failed to load image:', currentImage.src);
    };

    // ---------- Drawing (The Critical Part) ----------
    function resetView() {
      if (!currentImage.complete || currentImage.naturalWidth === 0) return;
      const imgW = currentImage.width;
      const imgH = currentImage.height;
      // Fit to window's CSS dimensions
      const winW = window.innerWidth;
      const winH = window.innerHeight;
      scale = Math.min(winW / imgW, winH / imgH);
      offsetX = (winW - imgW * scale) / 2;
      offsetY = (winH - imgH * scale) / 2;
      drawImage();
    }

    function drawImage() {
      // Clear everything
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (!currentImage.complete || currentImage.naturalWidth === 0) return;

      // *** THE FIX ***
      // Apply the DPR scale to the entire canvas, so every drawing operation is in the high-resolution space.
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      // Now apply our pan & zoom (still in CSS pixels, but now mapped to real screen pixels)
      ctx.translate(offsetX, offsetY);
      ctx.scale(scale, scale);
      
      // Draw the image. Since the canvas and transform handle the DPR, the image will appear crisp.
      ctx.drawImage(currentImage, 0, 0);
      
      // Reset the transform for the next frame (important for clearRect and other operations)
      ctx.setTransform(1, 0, 0, 1, 0, 0);
    }

    // ---- Mouse & Touch Events ----
    // ... (all the same pan/zoom/swipe logic you already have)

    resize();
  })();
</script>
</body>
</html>
